<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>芳香療法精油地圖與配方資料庫</title>
    <!-- 引入 Leaflet 地圖庫的 CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; padding: 20px; background-color: #f5f7fa; margin: 0; }
        h1 { color: #2c3e50; }
        
        /* 地圖容器樣式 */
        #map { height: 500px; width: 100%; border-radius: 12px; border: 2px solid #cbd5e1; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        /* 標題區與按鈕排版 */
        .section-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #cbd5e1; padding-bottom: 10px; margin-top: 40px; }
        .section-header h2 { color: #2c3e50; margin: 0; }
        #reset-btn { display: none; padding: 8px 16px; background-color: #0ea5e9; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #reset-btn:hover { background-color: #0284c7; }

        /* 配方卡片排版樣式 */
        #blend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 15px;}
        .blend-card { background: white; border: 1px solid #e1e4e8; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .blend-title { font-weight: bold; font-size: 18px; margin-bottom: 12px; color: #2c3e50; border-bottom: 2px solid #eef0f2; padding-bottom: 8px;}
        .blend-indic { margin-bottom: 15px; }
        .badge { background: #e0f2fe; color: #0369a1; padding: 4px 10px; border-radius: 20px; font-size: 12px; margin-right: 5px; font-weight: bold;}
        .badge.b-purple { background: #f3e8ff; color: #7e22ce; }
        .blend-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 14px; cursor: help; border-bottom: 1px dashed #f0f0f0; padding-bottom: 4px;}
        .blend-row:hover { background-color: #f8fafc; color: #0284c7; }
        .blend-note { margin-top: 15px; font-size: 13px; color: #64748b; background: #f8fafc; padding: 10px; border-radius: 6px; border-left: 3px solid #cbd5e1;}
        .blend-route { margin-top: 15px; }
        
        /* 地圖彈出視窗樣式 */
        .popup-content h3 { margin: 0 0 5px 0; color: #0f172a; }
        .popup-content p { margin: 4px 0; font-size: 13px; color: #334155; }
        .popup-btn { margin-top: 10px; width: 100%; padding: 6px; background: #10b981; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .popup-btn:hover { background: #059669; }
    </style>
</head>
<body>

    <h1>🌍 芳療精油世界地圖與配方庫</h1>
    
    <!-- 地圖顯示區域 -->
    <div id="map"></div>

    <div class="section-header" id="blends-section">
        <h2>📋 芳療配方與機制資料庫</h2>
        <!-- 重置篩選按鈕 (預設隱藏) -->
        <button id="reset-btn" onclick="resetFilter()">顯示所有配方 (Show All)</button>
    </div>
    <p id="b-count" style="color: #64748b; font-weight: bold;">載入配方中...</p>

    <!-- 配方顯示區域 -->
    <div id="blend-grid"></div>

    <!-- 引入 Leaflet 地圖庫的 JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    let AROMA_DATA = { OIL_DATABASE: {}, BLENDS_LIBRARY: [] };
    let map;

    window.onload = async function() {
        // 初始化地圖 (設定中心點與縮放級別)
        map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        try {
            const response = await fetch('data.json');
            AROMA_DATA = await response.json();
            
            // 渲染地圖標記與配方卡片
            renderMapMarkers(AROMA_DATA.OIL_DATABASE);
            renderB(AROMA_DATA.BLENDS_LIBRARY);
            
        } catch (error) {
            console.error("無法載入資料庫", error);
            document.getElementById('blend-grid').innerHTML = '<p style="color:red;">無法載入 data.json 資料。</p>';
        }
    };

    // 將精油標記在地圖上
    function renderMapMarkers(oilDb) {
        for (const [oilName, info] of Object.entries(oilDb)) {
            if (info.lat && info.lng) {
                const popupHtml = `
                    <div class="popup-content">
                        <h3>${oilName}</h3>
                        <p><b>科屬:</b> ${info.family}</p>
                        <p><b>產地:</b> ${info.origin}</p>
                        <p><b>植物型態:</b> ${info.type}</p>
                        <p><b>療癒機制:</b> ${info.function}</p>
                        <button class="popup-btn" onclick="filterBlendsByOil('${oilName}')">查看相關配方 👇</button>
                    </div>
                `;
                
                // 綁定標記並在地圖上繪製
                const marker = L.marker([info.lat, info.lng]).addTo(map);
                marker.bindPopup(popupHtml);
                
                // 點擊地標時自動篩選
                marker.on('click', function() {
                    filterBlendsByOil(oilName);
                });
            }
        }
    }

    // 篩選配方邏輯
    function filterBlendsByOil(clickedOilName) {
        // 尋找包含該精油名稱的配方
        const filteredBlends = AROMA_DATA.BLENDS_LIBRARY.filter(blend => {
            // 檢查配方中的精油列表，看是否有包含點擊的精油名稱
            return blend.oils.some(o => o.n.includes(clickedOilName));
        });
        
        // 渲染篩選後的配方
        renderB(filteredBlends);
        
        // 更新文字並顯示「重置」按鈕
        document.getElementById('b-count').textContent = `🎯 已篩選包含「${clickedOilName}」的配方 (共 ${filteredBlends.length} 個)`;
        document.getElementById('b-count').style.color = '#0ea5e9';
        document.getElementById('reset-btn').style.display = 'block';
        
        // 畫面平滑滾動到配方區域
        document.getElementById('blends-section').scrollIntoView({ behavior: 'smooth' });
    }

    // 恢復顯示所有配方
    function resetFilter() {
        renderB(AROMA_DATA.BLENDS_LIBRARY);
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('b-count').style.color = '#64748b';
    }

    // 配方渲染函數
    function renderB(rows) {
      const grid = document.getElementById('blend-grid');
      grid.innerHTML = ''; 
      
      if (rows.length === 0) {
          grid.innerHTML = '<p style="color:#64748b; margin-top:20px;">此精油目前沒有對應的配方資料。</p>';
          return;
      }
      
      rows.forEach(r => {
        const card = document.createElement('div');
        card.className = 'blend-card';
        const routeHtml = r.routes ? r.routes.map(rt => `<span class="badge b-blue">${rt}</span>`).join('') : '';
        
        const oilsHtml = r.oils.map(o => {
            const oilKey = o.n.split(' ')[0]; 
            const info = AROMA_DATA.OIL_DATABASE[oilKey] || { function: "機制詳見化合物列表" };
            return `<div class="blend-row" title="療癒機制: ${info.function}">
                      <span class="blend-name">${o.n}</span>
                      <span class="blend-pct">${o.p}</span>
                    </div>`;
        }).join('');
        
        card.innerHTML = `
          <div class="blend-title">${r.name}</div>
          <div class="blend-indic"><span class="badge b-purple">${r.sys}</span></div>
          ${oilsHtml}
          <div class="blend-route">${routeHtml}</div>
          ${r.note ? `<div class="blend-note">${r.note}</div>` : ''}`;
        grid.appendChild(card);
      });
      
      // 只有在顯示所有配方時才更新文字
      if (document.getElementById('reset-btn').style.display === 'none' || document.getElementById('reset-btn').style.display === '') {
          document.getElementById('b-count').textContent = '共載入 ' + rows.length + ' 個配方 (滑鼠停留在精油名稱上可查看機制)';
      }
    }
    </script>
</body>
</html>
