<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>精油世界地圖與資料庫</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #0ea5e9; --glass: rgba(255, 255, 255, 0.8); }
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%); min-height: 100vh; margin: 0; }
        h1 { color: #1e293b; text-align: center; margin-bottom: 20px; }
        
        #map { height: 500px; width: 100%; border-radius: 16px; border: 4px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* 搜尋列與過濾器 */
        .search-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .search-container input { padding: 10px 15px; width: 100%; max-width: 350px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px; outline: none; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .search-container input:focus { border-color: var(--primary); }
        .search-container button { padding: 10px 20px; border-radius: 8px; background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; box-shadow: 0 2px 6px rgba(0,0,0,0.1); transition: 0.2s; }
        .search-container button:hover { background: #0284c7; }

        .filter-controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 25px; }
        .filter-controls button { padding: 8px 16px; border: none; border-radius: 8px; background: white; box-shadow: 0 2px 6px rgba(0,0,0,0.1); cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.3s; }
        .filter-controls button:hover { background: var(--primary); color: white; }
        
        /* 玻璃卡片 */
        #blend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .blend-card { background: var(--glass); backdrop-filter: blur(10px); padding: 20px; border-radius: 16px; border-left: 5px solid var(--primary); box-shadow: 0 8px 16px rgba(0,0,0,0.05); }
        .blend-title { font-size: 19px; font-weight: 700; color: #0f172a; margin-bottom: 12px; }
        .badge { font-size: 10px; padding: 3px 10px; border-radius: 12px; background: #e0f2fe; color: var(--primary); display: inline-block; margin-bottom: 10px; }
        .blend-row { cursor: pointer; padding: 8px; border-radius: 6px; border-bottom: 1px solid rgba(0,0,0,0.05); transition: 0.2s; }
        .blend-row:hover { background: rgba(14, 165, 233, 0.1); }
        .blend-info { font-size: 11px; color: #475569; margin-top: 4px; }
        
        /* Popup 專業樣式 */
        .popup-content { min-width: 220px; line-height: 1.4; }
        .tag { display: inline-block; background: #e0f2fe; padding: 2px 6px; border-radius: 4px; margin: 2px; font-size: 10px; color: #0369a1; border: 1px solid #bae6fd; }
    </style>
</head>
<body>

    <h1>🌿 精油世界地圖與資料庫 🌿</h1>
    
    <div class="search-container">
        <input type="text" id="oil-search" placeholder="🔍 搜尋精油名稱 (例如: 茶樹, 薰衣草)...">
        <button onclick="searchOil()">搜尋</button>
    </div>

    <div id="map"></div>

    <div class="filter-controls" id="filter-controls">
        <button onclick="resetFilter()" style="background:var(--primary); color:white;">顯示全部</button>
        <button onclick="toggleStudyMode()">隱藏/顯示詳細資訊</button>
    </div>

    <p id="b-count" style="text-align:center; font-weight:bold; color:#334155; margin-bottom: 15px;"></p>
    <div id="blend-grid"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    let AROMA_DATA = { OIL_DATABASE: {}, BLENDS_LIBRARY: [] };
    let map, markers = {};

    window.onload = async function() {
        map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CartoDB' }).addTo(map);

        // 綁定 Enter 鍵觸發搜尋
        document.getElementById('oil-search').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchOil();
        });

        try {
            const res = await fetch('data.json');
            AROMA_DATA = await res.json();
            
            renderMapMarkers(AROMA_DATA.OIL_DATABASE);
            renderB(AROMA_DATA.BLENDS_LIBRARY);
            generateSystemFilters();
        } catch (error) {
            console.error("載入 JSON 失敗:", error);
            alert("資料庫載入失敗，請確保 data.json 格式正確無誤。");
        }
    };

    function renderMapMarkers(oilDb) {
        for (const [name, info] of Object.entries(oilDb)) {
            if (info.lat && info.lng) {
                // 【修復重疊】加入微小的隨機偏移 (Jitter)，讓同座標的精油散開成小聚落
                const jitterLat = info.lat + (Math.random() - 0.5) * 1.5;
                const jitterLng = info.lng + (Math.random() - 0.5) * 1.5;

                const marker = L.circleMarker([jitterLat, jitterLng], { radius: 7, fillColor: '#0ea5e9', color: '#fff', weight: 2, fillOpacity: 0.9 }).addTo(map);
                markers[name] = marker;

                const compHtml = (info.compounds && Array.isArray(info.compounds)) 
                    ? info.compounds.map(c => `<span class="tag">${c}</span>`).join('') 
                    : '<span class="tag" style="background:#f1f5f9; color:#94a3b8; border:none;">暫無紀錄</span>';
                
                const funcHtml = (info.functions && Array.isArray(info.functions)) 
                    ? info.functions.map(f => `<li>${f}</li>`).join('') 
                    : `<li>${info.function || '暫無紀錄'}</li>`;

                marker.bindPopup(`
                    <div class="popup-content">
                        <h3 style="margin:0 0 5px 0; color:#0f172a;">${name}</h3>
                        <div style="font-size:11px; margin-bottom:8px; color:#64748b;">
                            🌿 ${info.family || '未知'} | 📍 ${info.origin || '未知'}
                        </div>
                        <div style="margin-bottom:8px;">
                            <strong style="font-size:12px;">化學結構:</strong><br>${compHtml}
                        </div>
                        <div style="margin-bottom:8px;">
                            <strong style="font-size:12px;">療癒機制:</strong>
                            <p style="margin:2px 0; font-size:11px; color:#334;">${info.mechanism || '（請參考下方適應症）'}</p>
                        </div>
                        <div style="margin-bottom:8px;">
                            <strong style="font-size:12px;">主要適應症:</strong>
                            <ul style="padding-left:18px; margin:2px 0; font-size:11px;">${funcHtml}</ul>
                        </div>
                        <button onclick="filterBlendsByOil('${name}')" style="width:100%; cursor:pointer; background:var(--primary); color:white; border:none; padding:6px; border-radius:4px; margin-top:5px;">查看相關配方</button>
                    </div>
                `);
            }
        }
    }

    function renderB(rows) {
        const grid = document.getElementById('blend-grid');
        grid.innerHTML = '';
        rows.forEach(r => {
            const oilsHtml = r.oils.map(o => {
                const name = o.n.split(' ')[0];
                const info = AROMA_DATA.OIL_DATABASE[name] || {};
                
                let funcDisplay = "未知";
                if (info.functions && Array.isArray(info.functions)) {
                    funcDisplay = info.functions.join('、');
                } else if (info.function) {
                    funcDisplay = info.function;
                }

                return `
                    <div class="blend-row" onclick="highlightOnMap('${name}')">
                        <div style="display:flex; justify-content:space-between; font-weight:bold; color:var(--primary);">
                            <span>${o.n}</span><span>${o.p}</span>
                        </div>
                        <div class="blend-info" style="display:none; margin-top:4px;">
                            科屬: ${info.family || '未知'} | 產地: ${info.origin || '未知'} | 效用: ${funcDisplay}
                        </div>
                    </div>`;
            }).join('');
            
            grid.innerHTML += `
                <div class="blend-card">
                    <div class="blend-title">${r.name}</div>
                    <span class="badge">${r.sys || '未分類'}</span>
                    ${oilsHtml}
                    <div class="blend-note" style="display:none; margin-top:10px; font-size:12px; color:#1e293b; background:#f8fafc; padding:8px; border-radius:6px; border-left:3px solid var(--primary);">
                        💡 <strong>使用方法:</strong> ${r.note || '無特別說明'}
                    </div>
                </div>`;
        });
        
        const countEl = document.getElementById('b-count');
        if(countEl) countEl.textContent = `共 ${rows.length} 個配方`;
    }

    // 搜尋功能邏輯
function searchOil() {
    const query = document.getElementById('oil-search').value.toLowerCase().trim();
    if (!query) return resetFilter();

    // 1. 搜尋配方 (Blends)
    const filteredBlends = AROMA_DATA.BLENDS_LIBRARY.filter(b => {
        const text = [b.name, b.sys, b.note, ...b.oils.map(o => o.n)].join(' ').toLowerCase();
        return text.includes(query);
    });
    renderB(filteredBlends);

    // 2. 搜尋精油資料庫 (Oils)
    const matchedKey = Object.keys(AROMA_DATA.OIL_DATABASE).find(k => {
        const info = AROMA_DATA.OIL_DATABASE[k];
        const text = [
            k, info.family, info.origin, 
            (info.compounds || []).join(' '), 
            (info.functions || []).join(' '), 
            info.mechanism
        ].join(' ').toLowerCase();
        return text.includes(query);
    });

    if (matchedKey && markers[matchedKey]) {
        map.setView(markers[matchedKey].getLatLng(), 6);
        markers[matchedKey].openPopup();
        }
    }

    function generateSystemFilters() {
        const container = document.getElementById('filter-controls');
        container.innerHTML = `
            <button onclick="resetFilter()" style="background:var(--primary); color:white;">顯示全部</button>
            <button onclick="toggleStudyMode()">隱藏/顯示詳細資訊</button>
        `;
        
        const systems = [...new Set(AROMA_DATA.BLENDS_LIBRARY.map(b => b.sys).filter(Boolean))];
        systems.forEach(sys => {
            const btn = document.createElement('button');
            btn.textContent = sys;
            btn.onclick = () => filterBySystem(sys);
            container.appendChild(btn);
        });
    }

    function highlightOnMap(name) {
        if (markers[name]) { 
            map.setView(markers[name].getLatLng(), 6); 
            markers[name].openPopup(); 
            document.getElementById('map').scrollIntoView({ behavior: 'smooth' }); 
        } else {
            alert(`目前地圖上沒有標示「${name}」的座標資料。`);
        }
    }

    function filterBlendsByOil(name) { renderB(AROMA_DATA.BLENDS_LIBRARY.filter(b => b.oils.some(o => o.n.includes(name)))); }
    function filterBySystem(sys) { renderB(AROMA_DATA.BLENDS_LIBRARY.filter(b => b.sys === sys)); }
    
    function resetFilter() { 
        document.getElementById('oil-search').value = '';
        renderB(AROMA_DATA.BLENDS_LIBRARY); 
    }
    
    function toggleStudyMode() { 
        document.querySelectorAll('.blend-info, .blend-note').forEach(el => {
            el.style.display = (el.style.display === 'none' || el.style.display === '') ? 'block' : 'none';
        }); 
    }
    </script>
</body>
</html>
