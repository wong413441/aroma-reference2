<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Nature Bliss 芳療科學地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #0ea5e9; --glass: rgba(255, 255, 255, 0.8); }
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%); min-height: 100vh; margin: 0; }
        h1 { color: #1e293b; text-align: center; margin-bottom: 20px; }
        
        #map { height: 500px; width: 100%; border-radius: 16px; border: 4px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 30px; }
        
        .filter-controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 25px; }
        .filter-controls button { padding: 10px 20px; border: none; border-radius: 8px; background: white; box-shadow: 0 2px 6px rgba(0,0,0,0.1); cursor: pointer; font-weight: 600; transition: 0.3s; }
        .filter-controls button:hover { background: var(--primary); color: white; }
        
        /* 玻璃卡片 */
        #blend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .blend-card { background: var(--glass); backdrop-filter: blur(10px); padding: 20px; border-radius: 16px; border-left: 5px solid var(--primary); box-shadow: 0 8px 16px rgba(0,0,0,0.05); }
        .blend-title { font-size: 19px; font-weight: 700; color: #0f172a; margin-bottom: 12px; }
        .blend-row { cursor: pointer; padding: 8px; border-radius: 6px; border-bottom: 1px solid rgba(0,0,0,0.05); transition: 0.2s; }
        .blend-row:hover { background: rgba(14, 165, 233, 0.1); }
        .blend-info { font-size: 11px; color: #475569; margin-top: 4px; }
        
        /* Popup 專業樣式 */
        .popup-content { min-width: 220px; line-height: 1.4; }
        .tag { display: inline-block; background: #e0f2fe; padding: 2px 6px; border-radius: 4px; margin: 2px; font-size: 10px; color: #0369a1; }
    </style>
</head>
<body>

    <h1>🌿 Nature Bliss 芳療科學地圖 🌿</h1>
    <div id="map"></div>

    <div class="filter-controls" id="filter-controls">
        <button onclick="resetFilter()" style="background:var(--primary); color:white;">顯示全部</button>
        <button onclick="toggleStudyMode()">隱藏/顯示詳細資訊</button>
    </div>

    <div id="blend-grid"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    let AROMA_DATA = { OIL_DATABASE: {}, BLENDS_LIBRARY: [] };
    let map, markers = {};

    window.onload = async function() {
        map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CartoDB' }).addTo(map);

        const res = await fetch('data.json');
        AROMA_DATA = await res.json();
        
        renderMapMarkers(AROMA_DATA.OIL_DATABASE);
        renderB(AROMA_DATA.BLENDS_LIBRARY);
        generateSystemFilters();
    };

    function renderMapMarkers(oilDb) {
        for (const [name, info] of Object.entries(oilDb)) {
            if (info.lat && info.lng) {
                const marker = L.circleMarker([info.lat, info.lng], {
                    radius: 7, fillColor: '#0ea5e9', color: '#fff', weight: 2, fillOpacity: 0.9
                }).addTo(map);
                markers[name] = marker;

                // 新的渲染邏輯：優先讀取陣列，若無則讀取舊版字串
                const compHtml = (info.compounds && Array.isArray(info.compounds)) 
                    ? info.compounds.map(c => `<span class="tag">${c}</span>`).join('') 
                    : (info.compounds || '暫無資料');
                
                const funcHtml = (info.functions && Array.isArray(info.functions)) 
                    ? info.functions.map(f => `<li>${f}</li>`).join('') 
                    : `<li>${info.function || '暫無資料'}</li>`;

                marker.bindPopup(`
                    <div class="popup-content">
                        <h3 style="margin:0;">${name}</h3>
                        <div style="font-size:11px; margin-bottom:5px;">科屬: ${info.family || '未知'} | 產地: ${info.origin || '未知'}</div>
                        <div style="margin-bottom:8px;"><strong>化學結構:</strong><br>${compHtml}</div>
                        <div style="margin-bottom:8px;"><strong>療癒機制:</strong><ul style="padding-left:18px; margin:0;">${funcHtml}</ul></div>
                        <button onclick="filterBlendsByOil('${name}')" style="width:100%; cursor:pointer;">查看配方</button>
                    </div>
                `);
            }
        }
    }

    function renderB(rows) {
        const grid = document.getElementById('blend-grid');
        grid.innerHTML = '';
        rows.forEach(r => {
            const oilsHtml = r.oils.map(o => {
                const name = o.n.split(' ')[0];
                const info = AROMA_DATA.OIL_DATABASE[name] || {};
                return `
                    <div class="blend-row" onclick="highlightOnMap('${name}')">
                        <div style="display:flex; justify-content:space-between; font-weight:bold; color:var(--primary);">
                            <span>${o.n}</span>
                            <span class="blend-pct">${o.p}</span>
                        </div>
                        <div class="blend-info" style="display:none;">
                            科屬: ${info.family || '未知'} | 產地: ${info.origin || '未知'}
                        </div>
                        <div class="blend-note" style="display:none; font-size:11px; color:#666; margin-top:2px;">
                            <strong>用法:</strong> ${r.note || '無特別說明'}
                        </div>
                    </div>`;
            }).join('');
            grid.innerHTML += `
                <div class="blend-card">
                    <div class="blend-title">${r.name}</div>
                    <span class="badge">${r.sys}</span>
                    ${oilsHtml}
                </div>`;
        });
        document.getElementById('b-count').textContent = `共 ${rows.length} 個配方`;
    }
    function generateSystemFilters() {
        const container = document.getElementById('filter-controls');
        [...new Set(AROMA_DATA.BLENDS_LIBRARY.map(b => b.sys))].forEach(sys => {
            const btn = document.createElement('button');
            btn.textContent = sys;
            btn.onclick = () => renderB(AROMA_DATA.BLENDS_LIBRARY.filter(b => b.sys === sys));
            container.appendChild(btn);
        });
    }

    function highlightOnMap(name) {
        if (markers[name]) { map.setView(markers[name].getLatLng(), 6); markers[name].openPopup(); document.getElementById('map').scrollIntoView({ behavior: 'smooth' }); }
    }

    function filterBlendsByOil(name) { renderB(AROMA_DATA.BLENDS_LIBRARY.filter(b => b.oils.some(o => o.n.includes(name)))); }
    function resetFilter() { renderB(AROMA_DATA.BLENDS_LIBRARY); }
    function toggleStudyMode() { document.querySelectorAll('.blend-info').forEach(el => el.style.display = (el.style.display === 'none') ? 'block' : 'none'); }
    </script>
</body>
</html>
