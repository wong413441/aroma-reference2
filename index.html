function badge(t,c){return`<span class="badge ${c}">${t}</span>`}

function renderC(rows){
  const tb=document.getElementById('tbody-c');
  tb.innerHTML='';
  rows.forEach(r=>{
    const names=r.compound.split('\n');
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${names[0]}<br><span style="font-weight:400;font-size:10px;color:var(--color-text-secondary)">${names[1]||''}</span><br><span style="font-size:9px;color:var(--color-text-tertiary)">${r.struct}</span></td>
      <td>${badge(r.cat,'b-gray')}</td>
      <td>${r.mechs.map(m=>badge(m,'b-coral')).join(' ')}</td>
      <td>${r.oils.map(o=>badge(o,'b-teal')).join(' ')}</td>
      <td>${r.indications.map(i=>badge(i,'b-purple')).join(' ')}</td>
      <td>${r.routes.map(rt=>badge(rt,'b-blue')).join(' ')}</td>
      <td style="font-size:10px;color:var(--color-text-secondary)">${r.cautions}</td>
      <td style="font-size:13px;font-weight:500;color:var(--color-text-primary)">${r.value||''}</td>`;
    tb.appendChild(tr);
  });
  document.getElementById('c-count').textContent=rows.length+' / '+COMPOUNDS.length+' 個';
}

function renderB(rows){
  const grid=document.getElementById('blend-grid');
  grid.innerHTML='';
  rows.forEach(r=>{
    const card=document.createElement('div');
    card.className='blend-card';
    const routeHtml=r.routes.map(rt=>badge(rt,'b-blue')).join('');
    const oilsHtml=r.oils.map(o=>`<div class="blend-row"><span class="blend-name">${o.n}</span><span class="blend-pct">${o.p}</span></div>`).join('');
    card.innerHTML=`
      <div class="blend-title">${r.name}</div>
      <div class="blend-indic">${badge(r.sys,'b-purple')}</div>
      ${oilsHtml}
      <div class="blend-route">${routeHtml}</div>
      ${r.note?`<div class="blend-note">${r.note}</div>`:''}`;
    grid.appendChild(card);
  });
  document.getElementById('b-count').textContent=rows.length+' / '+BLENDS.length+' 個配方';
}

function filterC(){
  const q=document.getElementById('search').value.toLowerCase();
  const cat=document.getElementById('cat').value;
  const sys=document.getElementById('sys').value;
  renderC(COMPOUNDS.filter(r=>{
    const text=(r.compound+r.struct+r.oils.join(' ')+r.indications.join(' ')+r.mechs.join(' ')).toLowerCase();
    return(!q||text.includes(q))&&(!cat||r.cat===cat)&&(!sys||r.sys.includes(sys));
  }));
}

function filterB(){
  const q=document.getElementById('b-search').value.toLowerCase();
  const sys=document.getElementById('b-sys').value;
  const route=document.getElementById('b-route').value;
  renderB(BLENDS.filter(r=>{
    const text=(r.name+(r.sys||'')+(r.oils||[]).map(o=>o.n).join(' ')+(r.note||'')).toLowerCase();
    return(!q||text.includes(q))&&(!sys||r.sys===sys)&&(!route||r.routes.includes(route));
  }));
}

function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${id}')"]`).classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}
